; radar-multi · firmware-tab5  —  display + touch node
; Target: M5Stack Tab5 (ESP32-P4, 5" 1280x720 touch)
;
; ESP32-P4 is NOT supported by the stock espressif32 platform yet. Use the
; pioarduino fork, which ships P4/Arduino-core support. If your PlatformIO
; already has a P4-capable espressif32, you can swap the platform line back.

[env:tab5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-p4-evboard        ; closest generic P4 board; override to m5stack-tab5 once available
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@^0.2.11
build_flags =
    -DBOARD_HAS_PSRAM
    ; shared wire contract (radar_protocol.h) lives one level up
    -I ../shared
    ; Phase 5: read the binary packet stream straight from the Cardputer (no hub)
    -DRADAR_DIRECT=1
    ; Grove/UART pins to the Cardputer — CONFIRM against the real Tab5 pinout
    -DRADAR_RX_PIN=18
    -DRADAR_TX_PIN=17
    -DRADAR_UART_BAUD=115200
