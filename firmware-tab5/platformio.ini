; radar-multi · firmware-tab5  —  Tab5 (ESP32-P4) display + touch
; Target: M5Stack Tab5 (ESP32-P4 + ESP32-C6, 5" 1280x720 touch)
;
; ESP32-P4 is NOT supported by the stock espressif32 platform yet. Use the
; pioarduino fork, which ships P4/Arduino-core support. If your PlatformIO
; already has a P4-capable espressif32, you can swap the platform line back.
;
; Two apps, selected by env (build_src_filter picks which main compiles):
;   [env:tab5]        PRIMARY  — RuView dashboard client (src/main_ruview.cpp)
;   [env:tab5-direct] FALLBACK — offline on-Tab5 renderer, direct ESP32→Tab5 UART
;                                (src/main_direct.cpp + include/radar_rx.h, role.h)

[tab5_common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-p4-evboard        ; closest generic P4 board; override to m5stack-tab5 once available
framework = arduino
monitor_speed = 115200

; ── PRIMARY: RuView dashboard client ─────────────────────────────────────────
[env:tab5]
extends = tab5_common
lib_deps =
    m5stack/M5Unified@^0.2.11
    bblanchon/ArduinoJson@^7.1.0
    links2004/WebSockets@^2.6.1
build_src_filter = +<*> -<main_direct.cpp>
build_flags =
    -DBOARD_HAS_PSRAM
    ; RuView server to poll (CardputerZero, or a dev box running the RuView Docker)
    -DRUVIEW_HOST='"127.0.0.1"'
    -DRUVIEW_PORT=3000
; KIT_SSID / KIT_PASS come from the gitignored credentials.ini (copy the example).
extra_configs = credentials.ini

; ── FALLBACK: offline no-server renderer (direct ESP32→Tab5 UART) ─────────────
[env:tab5-direct]
extends = tab5_common
lib_deps =
    m5stack/M5Unified@^0.2.11
build_src_filter = +<*> -<main_ruview.cpp>
build_flags =
    -DBOARD_HAS_PSRAM
    -I ../shared            ; shared/radar_protocol.h
    -DRADAR_DIRECT=1
    -DRADAR_RX_PIN=18       ; Grove/UART pins to the sensor — CONFIRM real Tab5 pinout
    -DRADAR_TX_PIN=17
    -DRADAR_UART_BAUD=115200
