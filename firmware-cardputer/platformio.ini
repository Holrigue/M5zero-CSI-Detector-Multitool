; radar-multi · firmware-cardputer  —  CSI sensor node
; Target: M5Stack Cardputer / Cardputer-Adv (ESP32-S3 / StampS3, 8MB flash, no PSRAM)
;
; WiFi creds live in credentials.ini (gitignored). Copy credentials.ini.example.
; The sensor associates to that network so it has traffic to measure CSI on.

[platformio]
default_envs = cardputer-radar-csi

[env:cardputer-radar-csi]
platform = espressif32@6.12.0
board = m5stack-stamps3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    m5stack/M5Unified@^0.2.11
    m5stack/M5Cardputer@^1.1.1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_M5Stack_StampS3
    ; shared wire contract (radar_protocol.h) lives one level up
    -I ../shared
    ; Grove UART -> hub / Tab5
    -DRADAR_RX_PIN=1
    -DRADAR_TX_PIN=2
    -DRADAR_UART_BAUD=115200
    -Os
; Pull in WiFi credentials from the gitignored file (SSID/PASS -> build flags).
extra_configs = credentials.ini
